<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 照片推荐系统</title>
  <style>
    :root{--bg:#0b1220;--card:#101a33;--text:#e8eeff;--muted:#a9b6dd;--pri:#6ea8fe;--danger:#ff6b6b}
    *{box-sizing:border-box;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:0 6vw 0 0;
      background:url('/login-bg.jpg') center/cover no-repeat fixed;
      color:var(--text);
    }
    .card{
      width:min(350px,92vw);
      height: 280px;
      background:rgba(7,12,26,.38);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      padding:18px 18px 16px;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
      transform: translate(-200px,150px);
    }
    label{display:block;margin:10px 0 6px;color:var(--muted);font-size:13px}
    input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);color:var(--text);outline:none}
    button{width:100%;margin-top:12px;padding:10px 12px;border-radius:10px;border:0;background:linear-gradient(135deg,#6ea8fe,#8a7dff);color:#0b1220;font-weight:700;cursor:pointer}
    .ghost{background:transparent;border:1px solid rgba(255,255,255,.16);color:var(--text)}
    a{color:var(--pri);text-decoration:none}
    a:hover{text-decoration:underline}
    .msg{margin-top:10px;color:var(--danger);min-height:20px;font-size:13px}
    .tiny{margin-top:10px;font-size:12px;color:var(--muted)}
    code{background:rgba(0,0,0,.35);padding:2px 6px;border-radius:8px}
    @media (max-width:860px){
      body{justify-content:center;padding:0 0 0 0}
    }
  </style>
</head>
<body>
  <div class="card">
    <h3 style="margin:0 0 6px">登录</h3>
    <label>用户名</label>
    <input id="loginUsername" placeholder="例如：tom" />
    <label>密码</label>
    <input id="loginPassword" type="password" placeholder="例如：123456" />
    <button id="btnLogin">登录</button>

    <div class="tiny" style="margin-top:10px">
      没有账号？<a href="/register.html" id="linkShowRegister">点击注册</a>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const msgEl = document.getElementById('msg');
    function showMsg(t){ msgEl.textContent = t || ''; }
    async function postForm(url, data){
      const body = new URLSearchParams(data);
      const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
      return await res.json();
    }
    document.getElementById('btnLogin').addEventListener('click', async () => {
      showMsg('');
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if(!username || !password) return showMsg('用户名/密码不能为空');
      const r = await postForm('/auth/login', {username, password});
      if(r.code===1){ location.href = '/app.html'; }
      else showMsg(r.msg || '登录失败');
    });

  </script>
</body>
</html>
